<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyAgent Pro • Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        .input-field {
            @apply w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200 outline-none transition-all bg-white text-slate-700;
        }
        .btn-primary {
            @apply w-full py-3.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all cursor-pointer active:scale-95;
        }
        .btn-google {
            @apply w-full py-3.5 bg-white text-slate-700 font-semibold rounded-xl shadow-md border-2 border-slate-200 hover:border-slate-300 hover:shadow-lg transform hover:-translate-y-0.5 transition-all cursor-pointer flex items-center justify-center gap-3;
        }
        .divider {
            @apply flex items-center gap-4 my-6;
        }
        .divider::before, .divider::after {
            content: '';
            @apply flex-1 h-px bg-slate-300;
        }
        .tab-btn {
            @apply px-6 py-2.5 rounded-xl font-medium transition-all cursor-pointer flex-1 text-center;
        }
        .tab-btn.active {
            @apply bg-indigo-600 text-white shadow-md;
        }
        .tab-btn:not(.active) {
            @apply bg-slate-100 text-slate-600 hover:bg-slate-200;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">💼</div>
            <h1 class="text-4xl font-bold text-white mb-2">MoneyAgent Pro</h1>
            <p class="text-white/80 text-lg">Mobile Money Business Manager</p>
        </div>

        <div class="glass-panel rounded-3xl shadow-2xl p-8">
            <div class="flex gap-2 mb-6 bg-slate-100 p-1.5 rounded-xl">
                <button onclick="switchAuthTab('login')" id="loginTab" class="tab-btn active">🔐 Sign In</button>
                <button onclick="switchAuthTab('register')" id="registerTab" class="tab-btn">✨ Register</button>
            </div>

            <div id="authMessage" class="hidden mb-4 p-4 rounded-xl text-sm font-medium"></div>

            <div class="mb-6">
                <button id="googleSignInBtn" class="btn-google">
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <div class="divider"><span class="text-sm text-slate-500 font-medium">or</span></div>

            <div id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="loginEmail" class="input-field" placeholder="agent@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" class="input-field" placeholder="••••••••">
                </div>
                <div class="flex justify-end">
                    <button onclick="forgotPassword()" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">Forgot password?</button>
                </div>
                <button onclick="loginWithEmail()" class="btn-primary">🔐 Sign In with Email</button>
            </div>

            <div id="registerForm" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="registerName" class="input-field" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="registerEmail" class="input-field" placeholder="agent@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
                    <input type="tel" id="registerPhone" class="input-field" placeholder="+265 888 123 456">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="registerPassword" class="input-field" placeholder="Min 6 characters">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" class="input-field" placeholder="Confirm password">
                </div>
                <button onclick="registerWithEmail()" class="btn-primary">✨ Create Account</button>
            </div>

            <div id="loadingState" class="hidden text-center py-8">
                <div class="inline-block animate-bounce text-4xl mb-4">⚡</div>
                <p class="text-slate-500 font-medium">Please wait...</p>
            </div>
        </div>

        <p class="text-center text-white/70 text-sm mt-6">🔒 Secure • Encrypted • Reliable</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyAVOYLcvyM6_MhU2RQTNDFnByp1Ye3q5_o",
            authDomain: "mobile-money-app-4cf66.firebaseapp.com",
            projectId: "mobile-money-app-4cf66",
            storageBucket: "mobile-money-app-4cf66.firebasestorage.app",
            messagingSenderId: "822891731705",
            appId: "1:822891731705:web:e666599c76ce413f0a6028"
        };

        const APP_ID = "mobile-money-agent";
        const app = initializeApp(FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        function showMessage(msg, type = 'info') {
            const el = document.getElementById('authMessage');
            const colors = {
                success: 'bg-emerald-100 text-emerald-800 border border-emerald-300',
                error: 'bg-rose-100 text-rose-800 border border-rose-300',
                info: 'bg-blue-100 text-blue-800 border border-blue-300'
            };
            el.className = `mb-4 p-4 rounded-xl text-sm font-medium ${colors[type]}`;
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            document.getElementById('loadingState').classList.toggle('hidden', !isLoading);
            document.getElementById('loginForm').classList.toggle('hidden', isLoading);
            document.getElementById('registerForm').classList.toggle('hidden', isLoading);
            document.getElementById('googleSignInBtn').classList.toggle('hidden', isLoading);
        }

        window.switchAuthTab = (tab) => {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            document.getElementById('authMessage').classList.add('hidden');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
            }
        };

        async function createAgentProfile(user, additionalData = {}) {
            const agentProfile = {
                name: additionalData.name || user.displayName || 'Agent',
                email: user.email,
                phone: additionalData.phone || '',
                agentId: user.uid,
                createdAt: new Date(),
                lastLogin: new Date(),
                capital: 0,
                status: 'active',
                authProvider: additionalData.authProvider || 'email'
            };
            await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'info'), agentProfile, { merge: true });
            await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'targets', 'daily_commission'), {
                amount: 10000, type: 'daily_commission', period: 'daily'
            });
        }

        async function updateLastLogin(userId) {
            await setDoc(doc(db, 'artifacts', APP_ID, 'users', userId, 'profile', 'info'), { lastLogin: new Date() }, { merge: true });
        }

        window.loginWithGoogle = async () => {
            setLoading(true);
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                const profileSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'info'));
                if (!profileSnap.exists()) {
                    await createAgentProfile(user, { name: user.displayName, authProvider: 'google' });
                } else {
                    await updateLastLogin(user.uid);
                }
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                console.error('Google sign-in error:', error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    showMessage('Google sign-in failed. Please try again.', 'error');
                }
                setLoading(false);
            }
        };

        window.loginWithEmail = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email) return showMessage('Please enter your email', 'error');
            if (!password) return showMessage('Please enter your password', 'error');
            setLoading(true);
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                await updateLastLogin(userCredential.user.uid);
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                console.error('Login error:', error);
                let message = 'Login failed';
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    message = 'Invalid email or password';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'Too many attempts. Please try again later';
                }
                showMessage(message, 'error');
                setLoading(false);
            }
        };

        window.registerWithEmail = async () => {
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            if (!name) return showMessage('Please enter your name', 'error');
            if (!email) return showMessage('Please enter your email', 'error');
            if (password.length < 6) return showMessage('Password must be at least 6 characters', 'error');
            if (password !== confirmPassword) return showMessage('Passwords do not match', 'error');
            setLoading(true);
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await createAgentProfile(userCredential.user, { name, phone, authProvider: 'email' });
                showMessage('Account created successfully! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                console.error('Registration error:', error);
                let message = 'Registration failed';
                if (error.code === 'auth/email-already-in-use') message = 'This email is already registered';
                else if (error.code === 'auth/weak-password') message = 'Password is too weak';
                showMessage(message, 'error');
                setLoading(false);
            }
        };

        window.forgotPassword = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) return showMessage('Please enter your email address first', 'info');
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage('Password reset email sent! Check your inbox.', 'success');
            } catch (error) {
                if (error.code === 'auth/user-not-found') showMessage('No account found with this email', 'error');
                else showMessage('Failed to send reset email', 'error');
            }
        };

        document.getElementById('googleSignInBtn').addEventListener('click', loginWithGoogle);

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('registerForm').classList.contains('hidden')) registerWithEmail();
                else loginWithEmail();
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
