<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyAgent Pro • Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 32px;
            width: 100%;
            max-width: 440px;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
            font-size: 15px;
        }
        .input-field:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-weight: 600;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-google {
            width: 100%;
            padding: 14px;
            background: white;
            color: #334155;
            font-weight: 600;
            font-size: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .btn-google:hover {
            border-color: #cbd5e1;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: #94a3b8;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-align: center;
        }
        .tab-btn.active {
            background: #6366f1;
            color: white;
        }
        .tab-btn:not(.active) {
            background: #f1f5f9;
            color: #64748b;
        }
        .tab-btn:not(.active):hover {
            background: #e2e8f0;
        }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="glass-panel">
        <!-- Logo -->
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="font-size: 56px; margin-bottom: 12px;">💼</div>
            <h1 style="font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;">MoneyAgent Pro</h1>
            <p style="color: #64748b; font-size: 16px;">Mobile Money Business Manager</p>
        </div>

        <!-- Messages -->
        <div id="errorMessage" class="error-msg"></div>
        <div id="successMessage" class="success-msg"></div>

        <!-- Tabs -->
        <div style="display: flex; gap: 8px; background: #f1f5f9; padding: 4px; border-radius: 12px; margin-bottom: 24px;">
            <button onclick="switchTab('login')" id="loginTab" class="tab-btn active">🔐 Sign In</button>
            <button onclick="switchTab('register')" id="registerTab" class="tab-btn">✨ Register</button>
        </div>

        <!-- Google Sign-In -->
        <div style="margin-bottom: 24px;">
            <button onclick="loginWithGoogle()" id="googleBtn" class="btn-google">
                <svg width="22" height="22" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
        </div>

        <div class="divider">or continue with email</div>

        <!-- Login Form -->
        <div id="loginForm">
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">Email Address</label>
                <input type="email" id="loginEmail" class="input-field" placeholder="agent@example.com" autocomplete="email">
            </div>
            <div style="margin-bottom: 8px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">Password</label>
                <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" onclick="forgotPassword()" style="font-size: 14px; color: #6366f1; text-decoration: none; font-weight: 500;">Forgot password?</a>
            </div>
            <button onclick="loginWithEmail()" id="loginBtn" class="btn-primary">🔐 Sign In with Email</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display: none;">
            <div style="margin-bottom: 14px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">Full Name</label>
                <input type="text" id="registerName" class="input-field" placeholder="John Doe">
            </div>
            <div style="margin-bottom: 14px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">Email Address</label>
                <input type="email" id="registerEmail" class="input-field" placeholder="agent@example.com" autocomplete="email">
            </div>
            <div style="margin-bottom: 14px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">Phone Number</label>
                <input type="tel" id="registerPhone" class="input-field" placeholder="+265 888 123 456">
            </div>
            <div style="margin-bottom: 14px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">Password</label>
                <input type="password" id="registerPassword" class="input-field" placeholder="Min 6 characters" autocomplete="new-password">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">Confirm Password</label>
                <input type="password" id="registerConfirmPassword" class="input-field" placeholder="Confirm password" autocomplete="new-password">
            </div>
            <button onclick="registerWithEmail()" id="registerBtn" class="btn-primary">✨ Create Account</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyAVOYLcvyM6_MhU2RQTNDFnByp1Ye3q5_o",
            authDomain: "mobile-money-app-4cf66.firebaseapp.com",
            projectId: "mobile-money-app-4cf66",
            storageBucket: "mobile-money-app-4cf66.firebasestorage.app",
            messagingSenderId: "822891731705",
            appId: "1:822891731705:web:e666599c76ce413f0a6028"
        };

        const APP_ID = "mobile-money-agent";
        
        try {
            const app = initializeApp(FIREBASE_CONFIG);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const googleProvider = new GoogleAuthProvider();

            console.log('Firebase initialized successfully');

            // Check if already logged in - ONLY redirect if user exists
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log('User already logged in, redirecting to dashboard...');
                    window.location.replace('dashboard.html');
                } else {
                    console.log('No user logged in, showing login page');
                }
            });

            function showError(msg) {
                const el = document.getElementById('errorMessage');
                el.textContent = msg;
                el.style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                setTimeout(() => el.style.display = 'none', 5000);
            }

            function showSuccess(msg) {
                const el = document.getElementById('successMessage');
                el.textContent = msg;
                el.style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                setTimeout(() => el.style.display = 'none', 5000);
            }

            function setLoading(btnId, isLoading) {
                const btn = document.getElementById(btnId);
                if (isLoading) {
                    btn.disabled = true;
                    btn.innerHTML = '<span class="loading-spinner"></span> Please wait...';
                } else {
                    btn.disabled = false;
                }
            }

            window.switchTab = (tab) => {
                document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
                document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
                document.getElementById('loginTab').classList.toggle('active', tab === 'login');
                document.getElementById('registerTab').classList.toggle('active', tab === 'register');
                document.getElementById('errorMessage').style.display = 'none';
                document.getElementById('successMessage').style.display = 'none';
            };

            async function createAgentProfile(user, additionalData = {}) {
                const agentProfile = {
                    name: additionalData.name || user.displayName || 'Agent',
                    email: user.email,
                    phone: additionalData.phone || '',
                    agentId: user.uid,
                    createdAt: new Date(),
                    lastLogin: new Date(),
                    capital: 0,
                    status: 'active',
                    authProvider: additionalData.authProvider || 'email'
                };
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'info'), agentProfile, { merge: true });
                await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'targets', 'daily_commission'), {
                    amount: 10000, type: 'daily_commission', period: 'daily'
                });
            }

            window.loginWithGoogle = async () => {
                setLoading('googleBtn', true);
                try {
                    const result = await signInWithPopup(auth, googleProvider);
                    const user = result.user;
                    const profileSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'info'));
                    if (!profileSnap.exists()) {
                        await createAgentProfile(user, { name: user.displayName, authProvider: 'google' });
                    } else {
                        await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'info'), { lastLogin: new Date() }, { merge: true });
                    }
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => window.location.replace('dashboard.html'), 500);
                } catch (error) {
                    console.error('Google sign-in error:', error);
                    if (error.code !== 'auth/popup-closed-by-user') {
                        showError('Google sign-in failed. Please try again.');
                    }
                    setLoading('googleBtn', false);
                }
            };

            window.loginWithEmail = async () => {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                if (!email) return showError('Please enter your email');
                if (!password) return showError('Please enter your password');
                
                setLoading('loginBtn', true);
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', userCredential.user.uid, 'profile', 'info'), { lastLogin: new Date() }, { merge: true });
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => window.location.replace('dashboard.html'), 500);
                } catch (error) {
                    console.error('Login error:', error);
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        showError('Invalid email or password');
                    } else if (error.code === 'auth/too-many-requests') {
                        showError('Too many attempts. Please try again later');
                    } else if (error.code === 'auth/invalid-email') {
                        showError('Invalid email address');
                    } else {
                        showError('Login failed: ' + error.message);
                    }
                    setLoading('loginBtn', false);
                }
            };

            window.registerWithEmail = async () => {
                const name = document.getElementById('registerName').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const phone = document.getElementById('registerPhone').value.trim();
                const password = document.getElementById('registerPassword').value;
                const confirmPassword = document.getElementById('registerConfirmPassword').value;
                
                if (!name) return showError('Please enter your name');
                if (!email) return showError('Please enter your email');
                if (password.length < 6) return showError('Password must be at least 6 characters');
                if (password !== confirmPassword) return showError('Passwords do not match');
                
                setLoading('registerBtn', true);
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await createAgentProfile(userCredential.user, { name, phone, authProvider: 'email' });
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => window.location.replace('dashboard.html'), 500);
                } catch (error) {
                    console.error('Registration error:', error);
                    if (error.code === 'auth/email-already-in-use') {
                        showError('This email is already registered. Please sign in instead.');
                    } else if (error.code === 'auth/weak-password') {
                        showError('Password is too weak. Use at least 6 characters');
                    } else {
                        showError('Registration failed: ' + error.message);
                    }
                    setLoading('registerBtn', false);
                }
            };

            window.forgotPassword = async () => {
                const email = document.getElementById('loginEmail').value.trim();
                if (!email) return showError('Please enter your email address first');
                try {
                    await sendPasswordResetEmail(auth, email);
                    showSuccess('Password reset email sent! Check your inbox.');
                } catch (error) {
                    if (error.code === 'auth/user-not-found') showError('No account found with this email');
                    else showError('Failed to send reset email: ' + error.message);
                }
            };

            // Handle Enter key
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const registerForm = document.getElementById('registerForm');
                    if (registerForm.style.display !== 'none') {
                        registerWithEmail();
                    } else {
                        loginWithEmail();
                    }
                }
            });

        } catch (error) {
            console.error('Initialization error:', error);
            document.getElementById('errorMessage').textContent = 'Failed to initialize app: ' + error.message;
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>
</body>
</html>
